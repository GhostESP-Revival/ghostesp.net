# Netlify configuration for GhostESP website
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."

# Canonical URL shape: serve extensionless URLs and redirect legacy .html paths.
[[redirects]]
  from = "/boards.html"
  to = "/boards"
  status = 301
  force = true

[[redirects]]
  from = "/flasher.html"
  to = "/flasher"
  status = 301
  force = true

[[redirects]]
  from = "/serial.html"
  to = "/serial"
  status = 301
  force = true

[[redirects]]
  from = "/companion.html"
  to = "/companion"
  status = 301
  force = true

[[redirects]]
  from = "/marketplace.html"
  to = "/marketplace"
  status = 301
  force = true

[[redirects]]
  from = "/asset-marketplace.html"
  to = "/asset-marketplace"
  status = 301
  force = true

[[redirects]]
  from = "/asset-pack-builder.html"
  to = "/asset-pack-builder"
  status = 301
  force = true

[[redirects]]
  from = "/irdb.html"
  to = "/irdb"
  status = 301
  force = true

[[redirects]]
  from = "/openwd.html"
  to = "/openwd"
  status = 301
  force = true

[[redirects]]
  from = "/blog.html"
  to = "/blog"
  status = 301
  force = true

[[redirects]]
  from = "/blog-deauth-vs-jamming.html"
  to = "/blog-deauth-vs-jamming"
  status = 301
  force = true

[[redirects]]
  from = "/blog-esp32-misconceptions.html"
  to = "/blog-esp32-misconceptions"
  status = 301
  force = true

[[redirects]]
  from = "/blog-module-not-problem.html"
  to = "/blog-module-not-problem"
  status = 301
  force = true

[[redirects]]
  from = "/brand-assets.html"
  to = "/brand-assets"
  status = 301
  force = true

[[redirects]]
  from = "/brand-guidelines.html"
  to = "/brand-guidelines"
  status = 301
  force = true

[[redirects]]
  from = "/feedback.html"
  to = "/feedback"
  status = 301
  force = true

# Pretty URLs - serve extensionless URLs from matching .html files.
[[redirects]]
  from = "/:url"
  to = "/:url.html"
  status = 200
  force = false

# Custom 404 page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' https://ghostesp.net https://raw.githubusercontent.com https://gesp.fuckyourcdn.com https://www.youtube.com https://i.ytimg.com https://static.wixstatic.com data:; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; frame-src https://www.youtube.com; connect-src 'self' https://raw.githubusercontent.com https://gesp.fuckyourcdn.com https://api.github.com https://cdn.spookytools.com https://www.google-analytics.com https://googleads.g.doubleclick.net https://discord.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
